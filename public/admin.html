<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="status"></p>
</div>

<div class="card">
<h2>Applications</h2>

<button onclick="loadApplications()">Refresh</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Destination</th>
<th>Budget</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="apps"></tbody>
</table>
</div>

<script>

let token = "";

if (localStorage.getItem("token")) {
  token = localStorage.getItem("token");
}

async function login() {
  const response = await fetch("http://localhost:5000/admin/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  const data = await response.json();

  if (data.token) {
    token = data.token;
    localStorage.setItem("token", token);

    document.getElementById("status").innerText = "Login successful";

    setTimeout(loadApplications, 500);
  } else {
    document.getElementById("status").innerText = "Login failed";
  }
}

async function loadApplications() {
  if (!token) return;

  const response = await fetch("http://localhost:5000/admin/applications", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const data = await response.json();

  let html = "";

  data.forEach(app => {
    html += `
      <tr>
        <td>${app.name}</td>
        <td>${app.email}</td>
        <td>${app.destination}</td>
        <td>${app.budget}</td>
        <td>${app.status}</td>
        <td>
          <button onclick="approve('${app._id}')">Approve</button>
          <button onclick="reject('${app._id}')">Reject</button>
          <a href="pay.html?id=${app._id}" target="_blank">Send Payment Link</a>
        </td>
      </tr>
    `;
  });

  document.getElementById("apps").innerHTML = html;
}

async function approve(id) {
  await fetch("http://localhost:5000/admin/approve/" + id, {
    method: "PATCH",
    headers: {
      Authorization: "Bearer " + token
    }
  });

  loadApplications();
}

async function reject(id) {
  await fetch("http://localhost:5000/admin/reject/" + id, {
    method: "PATCH",
    headers: {
      Authorization: "Bearer " + token
    }
  });

  loadApplications();
}

</script>

</body>
</html>
